<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>BLOCKS Admin | Dashboard</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
  <!-- Use a clean, modern font stack -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-gradient: linear-gradient(145deg, #eef2ff 0%, #f9fafc 55%, #ffffff 100%);
      --bg-nav: rgba(255, 255, 255, 0.92);
      --bg-card: rgba(255, 255, 255, 0.88);
      --bg-card-inner: #ffffff;
      --bg-bar-track: #e2e8f0;
      --bg-bar-fill-start: #3b82f6;
      --bg-bar-fill-end: #6366f1;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --border: rgba(0, 0, 0, 0.06);
      --shadow-sm: 0 12px 28px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
      --shadow-md: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
      --accent-blue: #3b82f6;
      --accent: #3b82f6;
    }

    body.dark-mode {
      --bg-gradient: linear-gradient(145deg, #0a0f1e 0%, #111827 55%, #030712 100%);
      --bg-nav: rgba(17, 24, 39, 0.94);
      --bg-card: rgba(17, 24, 39, 0.85);
      --bg-card-inner: #1e293b;
      --bg-bar-track: #334155;
      --bg-bar-fill-start: #60a5fa;
      --bg-bar-fill-end: #818cf8;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border: rgba(71, 85, 105, 0.5);
      --shadow-sm: 0 12px 28px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
      --accent: #60a5fa;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
      min-height: 100vh;
    }

    /* Smooth theme transitions */
    * {
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    /* Navigation */
    .admin-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      background: var(--bg-nav);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .admin-nav__brand {
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .admin-nav__links {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .admin-nav__links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 40px;
      transition: all 0.2s;
      background: transparent;
      border: 1px solid transparent;
    }

    .admin-nav__links a.active,
    .admin-nav__links a:hover {
      background: rgba(59, 130, 246, 0.12);
      border-color: var(--border);
      color: var(--text-primary);
    }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 16px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      background: var(--bg-card);
    }

    /* page layout */
    .page-shell {
      padding: 120px 28px 48px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .dashboard {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* main panel */
    .panel {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 32px 36px;
      box-shadow: var(--shadow-md);
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 32px;
    }

    .panel-title {
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, var(--text-primary), var(--accent));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .panel-subtitle {
      color: var(--text-secondary);
      margin-top: 8px;
      font-size: 0.95rem;
      max-width: 600px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card-inner);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 10px 24px;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border: none;
      box-shadow: 0 2px 8px rgba(59,130,246,0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    /* stats cards */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 36px;
    }

    .summary-card {
      background: var(--bg-card-inner);
      border-radius: 1.5rem;
      padding: 24px 20px;
      border: 1px solid var(--border);
      transition: transform 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .summary-card h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .summary-card p {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .summary-card span {
      display: block;
      margin-top: 10px;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    /* Two column layout for charts */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
    }

    .chart-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 1.75rem;
      padding: 28px 24px;
      box-shadow: var(--shadow-md);
    }

    .chart-card h3 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.2px;
    }

    /* FIXED CATEGORY BAR CHART – standard column chart like reference image */
    .category-chart-container {
      width: 100%;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 24px;
      justify-content: center;
      min-width: 300px;
      flex-wrap: wrap;
    }

    .bar-item {
      flex: 1;
      min-width: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .bar-label {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-align: center;
      word-break: break-word;
      max-width: 110px;
    }

    .bar-value-top {
      font-weight: 800;
      font-size: 0.9rem;
      color: var(--text-primary);
      background: var(--bg-card-inner);
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .bar-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .bar-column {
      width: 52px;
      max-width: 70px;
      background: var(--bg-bar-track);
      border-radius: 20px 20px 12px 12px;
      height: 200px; /* fixed container height */
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .bar-fill {
      width: 100%;
      background: linear-gradient(0deg, var(--bg-bar-fill-start), var(--bg-bar-fill-end));
      border-radius: 12px 12px 8px 8px;
      transition: height 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 -2px 6px rgba(0,0,0,0.05);
    }

    /* stock level cards */
    .stock-level-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .stock-level-card {
      background: var(--bg-card-inner);
      border-radius: 1.25rem;
      padding: 18px;
      border: 1px solid var(--border);
    }

    .stock-level-label {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .stock-level-bar {
      height: 12px;
      background: var(--bg-bar-track);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .stock-level-fill {
      height: 100%;
      border-radius: 20px;
      transition: width 0.3s ease;
    }

    .stock-level-count {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: right;
    }

    .no-data-message {
      text-align: center;
      padding: 40px 20px;
      background: var(--bg-card-inner);
      border-radius: 1.5rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    @media (max-width: 860px) {
      .page-shell { padding: 110px 20px 32px; }
      .panel { padding: 24px; }
      .content-grid { grid-template-columns: 1fr; gap: 20px; }
      .card-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .admin-nav { padding: 12px 20px; }
      .admin-nav__brand { font-size: 1.1rem; }
      .admin-nav__links { gap: 8px; }
      .admin-nav__links a { padding: 6px 12px; font-size: 0.9rem; }
      .bar-column { width: 42px; }
      .bar-item { min-width: 55px; }
    }
  </style>
</head>
<body>
  <header class="admin-nav">
    <div class="admin-nav__brand">BLOCKS Admin</div>
    <nav class="admin-nav__links">
      <a href="{{ url_for('admin_dashboard') }}" class="active">Dashboard</a>
      <a href="{{ url_for('admin_products') }}">Products</a>
      <a href="{{ url_for('admin_logout') }}">Logout</a>
      <button class="theme-toggle" id="themeToggleBtn" aria-label="Dark mode">
        <i class="fas fa-moon"></i>
      </button>
    </nav>
  </header>
  <div class="page-shell">
    <div class="dashboard">
      <div class="panel">
        <div class="panel-top">
          <div>
            <h1 class="panel-title">Welcome back, Admin</h1>
            <p class="panel-subtitle">Live product metrics, category distribution, and stock health — all in one place.</p>
          </div>
          <div class="actions">
            <a href="{{ url_for('admin_products') }}" class="btn btn-primary">Manage Products</a>
          </div>
        </div>

        <div class="card-grid" id="statsContainer">
          <!-- dynamic summary cards -->
        </div>
      </div>

      <div class="content-grid">
        <!-- Category Share - FIXED column bar graph (standard) -->
        <div class="chart-card">
          <h3>📊 Category share</h3>
          <div id="categoryChartArea">
            <div class="no-data-message">Loading categories...</div>
          </div>
        </div>

        <!-- Stock levels chart -->
        <div class="chart-card">
          <h3>📉 Stock distribution</h3>
          <div id="stockChartArea">
            <div class="no-data-message">Loading stock levels...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
<!-- Back to Top Button with Progress -->
<div id="backToTopContainer" style="position: fixed; bottom: 20px; right: 20px; display: none; z-index: 1000;">
  <button id="backToTop" style="position: relative; width: 56px; height: 56px; padding: 0; font-size: 0; background-color: #333; color: #fff; border: none; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;">
    <!-- Circular Progress Background -->
    <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="26" fill="none" stroke="#444" stroke-width="4.3" />
      <circle id="progressCircle" cx="28" cy="28" r="26" fill="none" stroke="#ffffff" stroke-width="4.3" stroke-dasharray="163.36" stroke-dashoffset="163.36" style="transform: rotate(-90deg); transform-origin: 28px 28px; transition: stroke-dashoffset 0.1s linear;" />
    </svg>
    <!-- Arrow Icon -->
    <svg id="backToTopArrow" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" style="position: relative; z-index: 1;">
      <polyline points="8,14 12,10 16,14" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<script>
  const backToTopContainer = document.getElementById('backToTopContainer');
  const backToTopButton = document.getElementById('backToTop');
  const progressCircle = document.getElementById('progressCircle');
  const circumference = 2 * Math.PI * 26; // radius = 26

  window.addEventListener('scroll', () => {
    const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
    const scrolled = window.scrollY;
    const scrollPercent = scrollHeight > 0 ? (scrolled / scrollHeight) * 100 : 0;

    // Show/hide button based on scroll position
    if (window.scrollY > 200) {
      backToTopContainer.style.display = 'block';
      backToTopContainer.style.opacity = '1';
      backToTopContainer.style.transform = 'scale(1)';
    } else {
      backToTopContainer.style.opacity = '0';
      backToTopContainer.style.transform = 'scale(0.9)';
      setTimeout(() => {
        if (window.scrollY <= 200) backToTopContainer.style.display = 'none';
      }, 300);
    }

    // Update progress circle
    const offset = circumference - (scrollPercent / 100) * circumference;
    progressCircle.style.strokeDashoffset = offset;
  });

  backToTopButton.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Hover effect
  const arrowIcon = document.getElementById('backToTopArrow');
  
  backToTopButton.addEventListener('mouseover', () => {
    backToTopButton.style.backgroundColor = '#fff';
    backToTopButton.style.boxShadow = '0 6px 12px rgba(76, 175, 80, 0.4)';
    arrowIcon.querySelector('polyline').style.stroke = '#333';
  });

  backToTopButton.addEventListener('mouseout', () => {
    backToTopButton.style.backgroundColor = '#333';
    backToTopButton.style.boxShadow = '0 4px 6px rgba(0, 0, 0, 0.1)';
    arrowIcon.querySelector('polyline').style.stroke = '#fff';
  });
</script>
  <script>
    // ----- MOCK / REAL DATA FETCH (Admin API endpoint) -----
    // The original page uses '/admin/api/products'. We'll fetch the same route.
    // If no real backend, we can provide fallback mock for demo, but we respect actual backend.
    async function fetchProductData() {
      try {
        const response = await fetch('/admin/api/products', {
          credentials: 'include',
          headers: { 'Accept': 'application/json' }
        });
        if (!response.ok) {
          if (response.status === 401 || response.status === 302) {
            window.location.href = '/admin/login';
            return null;
          }
          console.warn('API responded with error, using fallback demo data for visualization');
          return getFallbackMockProducts();
        }
        const data = await response.json();
        if (!Array.isArray(data)) {
          console.warn('API did not return array, using fallback');
          return getFallbackMockProducts();
        }
        return data;
      } catch (err) {
        console.error('Fetch error, using fallback dataset for demo', err);
        return getFallbackMockProducts();
      }
    }

    // Fallback data: includes realistic categories + stock values, similar to typical dataset
    function getFallbackMockProducts() {
      return [
        { ProductID: 1, Category: "Coating", Stock: 42 },
        { ProductID: 2, Category: "Coating", Stock: 15 },
        { ProductID: 3, Category: "Food", Stock: 102 },
        { ProductID: 4, Category: "Food", Stock: 25 },
        { ProductID: 5, Category: "Coating", Stock: 8 },
        { ProductID: 6, Category: "Beverage", Stock: 31 },
        { ProductID: 7, Category: "Beverage", Stock: 12 },
        { ProductID: 8, Category: "Food", Stock: 145 },
        { ProductID: 9, Category: "Coating", Stock: 3 },
        { ProductID: 10, Category: "Food", Stock: 63 },
        { ProductID: 11, Category: "Beverage", Stock: 1 },
        { ProductID: 12, Category: "Coating", Stock: 5 },
        { ProductID: 13, Category: "Food", Stock: 98 },
        { ProductID: 14, Category: "Snacks", Stock: 27 },
        { ProductID: 15, Category: "Snacks", Stock: 44 },
        { ProductID: 16, Category: "Food", Stock: 22 },
        { ProductID: 17, Category: "Coating", Stock: 10 },
        { ProductID: 18, Category: "Beverage", Stock: 9 },
        { ProductID: 19, Category: "Snacks", Stock: 18 },
        { ProductID: 20, Category: "Food", Stock: 37 }
      ];
    }

    // Helper to parse categories (handles comma or semicolon separated values)
    function parseCategories(rawCategory) {
      if (!rawCategory) return [];
      return String(rawCategory)
        .split(/[,;]/)
        .map(c => c.trim())
        .filter(c => c !== "");
    }

    // Render everything: stats, category bar chart (standard column graph), stock distribution
    async function renderDashboard() {
      const products = await fetchProductData();
      if (!products) return;

      if (!products.length) {
        document.getElementById('statsContainer').innerHTML = `<div class="summary-card"><h3>No products</h3><p>0</p><span>No data available</span></div>`;
        document.getElementById('categoryChartArea').innerHTML = '<div class="no-data-message">No category data</div>';
        document.getElementById('stockChartArea').innerHTML = '<div class="no-data-message">No stock data</div>';
        return;
      }

      // ----- basic metrics -----
      const totalProducts = products.length;
      const uniqueCategoriesSet = new Set();
      let totalStockSum = 0;
      let lowStockCounter = 0;

      products.forEach(p => {
        const stockVal = parseInt(p.Stock) || 0;
        totalStockSum += stockVal;
        if (stockVal > 0 && stockVal <= 10) lowStockCounter++;
        const cats = parseCategories(p.Category);
        cats.forEach(c => uniqueCategoriesSet.add(c));
      });

      const uniqueCategoriesCount = uniqueCategoriesSet.size;

      // update stats cards
      document.getElementById('statsContainer').innerHTML = `
        <div class="summary-card">
          <h3>Total products</h3>
          <p>${totalProducts}</p>
          <span>All store SKUs</span>
        </div>
        <div class="summary-card">
          <h3>Categories</h3>
          <p>${uniqueCategoriesCount}</p>
          <span>Distinct product groups</span>
        </div>
        <div class="summary-card">
          <h3>Total inventory</h3>
          <p>${totalStockSum}</p>
          <span>Units in warehouse</span>
        </div>
      `;

      // ----- CATEGORY SHARE: Standard column bar graph (exactly like normal bar chart) -----
      const categoryCounts = new Map();
      products.forEach(p => {
        const categories = parseCategories(p.Category);
        categories.forEach(cat => {
          categoryCounts.set(cat, (categoryCounts.get(cat) || 0) + 1);
        });
      });

      if (categoryCounts.size === 0) {
        document.getElementById('categoryChartArea').innerHTML = '<div class="no-data-message">No category information</div>';
      } else {
        // sort descending by count for better visual
        const sortedCategories = Array.from(categoryCounts.entries()).sort((a, b) => b[1] - a[1]);
        const maxCount = Math.max(...sortedCategories.map(([, count]) => count), 1);
        const barMaxHeight = 200; // px

        const barChartHTML = `
          <div class="category-chart-container">
            <div class="bar-chart">
              ${sortedCategories.map(([category, count]) => {
                const barHeight = Math.max(28, (count / maxCount) * barMaxHeight);
                return `
                  <div class="bar-item">
                    <div class="bar-value-top">${count}</div>
                    <div class="bar-wrapper">
                      <div class="bar-column" style="height: ${barMaxHeight}px;">
                        <div class="bar-fill" style="height: ${barHeight}px;"></div>
                      </div>
                    </div>
                    <div class="bar-label">${escapeHtml(category)}</div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
        document.getElementById('categoryChartArea').innerHTML = barChartHTML;
      }

      // ----- STOCK LEVELS: out of stock, 1-2, 3+ (additional segmentation: zero, low critical, normal)-----
      let zeroStock = 0;
      let stockOneTwo = 0;
      let stockThreePlus = 0;

      products.forEach(p => {
        const stock = parseInt(p.Stock) || 0;
        if (stock === 0) zeroStock++;
        else if (stock >= 1 && stock <= 2) stockOneTwo++;
        else if (stock >= 3) stockThreePlus++;
      });

      const stockLevels = [
        { label: 'Out of stock', count: zeroStock, color: '#ef4444', desc: 'No units left' },
        { label: 'Critical (1-2)', count: stockOneTwo, color: '#f97316', desc: 'Very low stock' },
        { label: 'In stock (≥3)', count: stockThreePlus, color: '#10b981', desc: 'Healthy levels' }
      ];

      const maxStockSegment = Math.max(zeroStock, stockOneTwo, stockThreePlus, 1);
      const stockHtml = `
        <div class="stock-level-grid">
          ${stockLevels.map(level => {
            const percentWidth = Math.max(8, (level.count / maxStockSegment) * 100);
            return `
              <div class="stock-level-card">
                <div class="stock-level-label">
                  <span style="font-weight:700;">${level.label}</span>
                  <span style="font-weight:800;">${level.count}</span>
                </div>
                <div class="stock-level-bar">
                  <div class="stock-level-fill" style="width: ${percentWidth}%; background: ${level.color};"></div>
                </div>
                <div class="stock-level-count">${level.count} product${level.count !== 1 ? 's' : ''} • ${level.desc}</div>
              </div>
            `;
          }).join('')}
        </div>
      `;
      document.getElementById('stockChartArea').innerHTML = stockHtml;
    }

    // simple XSS escape for category names
    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }

    // ---- Theme handling ----
    const themeBtn = document.getElementById('themeToggleBtn');
    const bodyEl = document.body;

    function initTheme() {
      const savedTheme = localStorage.getItem('adminTheme');
      if (savedTheme === 'dark') {
        bodyEl.classList.add('dark-mode');
        if (themeBtn) {
          const icon = themeBtn.querySelector('i');
          if (icon) icon.className = 'fas fa-sun';
        }
      } else {
        bodyEl.classList.remove('dark-mode');
        if (themeBtn) {
          const icon = themeBtn.querySelector('i');
          if (icon) icon.className = 'fas fa-moon';
        }
      }
    }

    if (themeBtn) {
      themeBtn.addEventListener('click', () => {
        bodyEl.classList.toggle('dark-mode');
        const isDark = bodyEl.classList.contains('dark-mode');
        const icon = themeBtn.querySelector('i');
        if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('adminTheme', isDark ? 'dark' : 'light');
      });
    }
    initTheme();

    // ---- Initial render + optional refresh every 30 secs (optional) ----
    document.addEventListener('DOMContentLoaded', () => {
      renderDashboard();
      // optional polling for realtime (disabled by default, but can uncomment)
      // setInterval(() => renderDashboard(), 30000);
    });
  </script>
</body>
</html>
