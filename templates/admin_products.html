<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BLOCKS Admin | Product Management</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* MODERN DARK/LIGHT SYSTEM - CSS CUSTOM PROPERTIES */
    :root {
      /* Light theme (default) */
      --bg-base: #f5f7fb;
      --bg-surface: rgba(255, 255, 255, 0.96);
      --bg-card: #ffffff;
      --bg-elevated: #ffffff;
      --bg-nav: rgba(255, 255, 255, 0.92);
      --bg-modal: rgba(255, 255, 255, 0.98);
      --text-primary: #0a0f1c;
      --text-secondary: #2c3e50;
      --text-muted: #5a6e8a;
      --border-light: rgba(0, 0, 0, 0.06);
      --border-medium: rgba(0, 0, 0, 0.1);
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 6px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
      --shadow-lg: 0 30px 45px -15px rgba(0, 0, 0, 0.12);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.2);
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --gradient-bar: linear-gradient(135deg, #3b82f6, #8b5cf6);
    }

    body.dark-mode {
      --bg-base: #0a0c15;
      --bg-surface: rgba(18, 22, 35, 0.96);
      --bg-card: #13182a;
      --bg-elevated: #1a1f35;
      --bg-nav: rgba(10, 12, 21, 0.94);
      --bg-modal: rgba(18, 22, 35, 0.98);
      --text-primary: #f0f3fa;
      --text-secondary: #b9c3e0;
      --text-muted: #7c85a6;
      --border-light: rgba(255, 255, 255, 0.06);
      --border-medium: rgba(255, 255, 255, 0.12);
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 30px 45px -15px rgba(0, 0, 0, 0.6);
      --accent: #60a5fa;
      --accent-glow: rgba(96, 165, 250, 0.25);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
      line-height: 1.5;
    }

    /* Smooth theme transitions */
    * {
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    /* Navigation */
    .admin-nav {
      position: sticky;
      top: 0;
      z-index: 1100;
      backdrop-filter: blur(20px);
      background: var(--bg-nav);
      border-bottom: 1px solid var(--border-light);
      padding: 0 32px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .admin-nav__brand {
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      background: var(--gradient-bar);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .admin-nav__links {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .admin-nav__links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 40px;
      transition: all 0.2s;
      font-size: 0.95rem;
      background: transparent;
    }

    .admin-nav__links a.active,
    .admin-nav__links a:hover {
      background: var(--accent-glow);
      color: var(--accent);
      backdrop-filter: blur(4px);
    }
    
    .theme-toggle {
      background: var(--bg-elevated);
      border: 1px solid var(--border-medium);
      border-radius: 40px;
      padding: 8px 18px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
    }

    .theme-toggle:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* main container */
    .page-shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 32px 48px;
    }

    /* header + actions */
    .page-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      margin-bottom: 32px;
    }

    .page-title {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, var(--text-primary), var(--accent));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .page-subtitle {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 0.95rem;
      max-width: 580px;
    }

    .btn-primary {
      background: var(--gradient-bar);
      border: none;
      padding: 12px 28px;
      border-radius: 44px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(59,130,246,0.2);
      font-size: 0.9rem;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 12px 24px -8px rgba(59,130,246,0.4);
    }

    .btn-secondary {
      background: var(--bg-elevated);
      border: 1px solid var(--border-medium);
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: var(--accent-glow);
      color: var(--accent);
      border-color: var(--accent);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 8px 16px;
      border-radius: 32px;
      font-weight: 600;
      color: var(--danger);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-danger:hover {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }

    /* filter bar - modern */
    .filter-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      margin-bottom: 32px;
      align-items: end;
    }

    .filter-control {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-control label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--text-muted);
    }

    .filter-control input,
    .filter-control select {
      background: var(--bg-card);
      border: 1px solid var(--border-medium);
      border-radius: 28px;
      padding: 12px 18px;
      font-size: 0.9rem;
      color: var(--text-primary);
      transition: all 0.2s;
      outline: none;
    }

    .filter-control input:focus,
    .filter-control select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* product grid modern */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }

    .product-card {
      background: var(--bg-card);
      border-radius: 32px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 1px solid var(--border-light);
      backdrop-filter: blur(2px);
      box-shadow: var(--shadow-sm);
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: var(--accent-glow);
    }

    .product-card.out-of-stock {
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.05);
    }

    .product-card.out-of-stock:hover {
      border-color: var(--danger);
      box-shadow: 0 30px 45px -15px rgba(239, 68, 68, 0.3);
    }

    .product-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background: linear-gradient(145deg, #e2e8f0, #cbd5e1);
      transition: transform 0.4s ease;
    }

    .product-card:hover .product-image {
      transform: scale(1.02);
    }

    .product-card h3 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 16px 20px 8px;
      color: var(--text-primary);
    }

    .product-card p {
      margin: 6px 20px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .product-tag {
      display: inline-flex;
      /* background: var(--accent-glow); */
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
    }

    .card-actions {
      display: flex;
      gap: 12px;
      padding: 16px 20px 24px;
      border-top: 1px solid var(--border-light);
      margin-top: 12px;
    }

    /* MODAL MODERN */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 20px;
    }

    .modal-content {
      max-width: 640px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      background: var(--bg-modal);
      border-radius: 48px;
      border: 1px solid var(--border-medium);
      box-shadow: var(--shadow-lg);
      animation: fadeSlideUp 0.2s ease;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 32px 0;
    }

    .modal-title {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .modal-body {
      padding: 24px 32px 36px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    form label {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: var(--text-secondary);
    }

    form input, form textarea {
      background: var(--bg-elevated);
      border: 1px solid var(--border-medium);
      border-radius: 28px;
      padding: 14px 20px;
      font-size: 0.95rem;
      color: var(--text-primary);
      transition: all 0.2s;
      width: 100%;
    }

    form input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* drag drop zone */
    .drag-drop-zone {
      border: 2px dashed var(--border-medium);
      border-radius: 32px;
      padding: 28px;
      text-align: center;
      background: var(--bg-elevated);
      cursor: pointer;
      transition: all 0.2s;
    }

    .drag-drop-zone:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
      transform: scale(0.99);
    }

    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .upload-progress {
      margin-top: 12px;
    }

    .progress-bar {
      height: 8px;
      background: var(--border-medium);
      border-radius: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--gradient-bar);
      width: 0%;
      transition: width 0.3s;
    }

    #imagePreview img {
      max-width: 100%;
      border-radius: 28px;
      margin-top: 16px;
      border: 2px solid var(--border-light);
    }

    .form-footer {
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      margin-top: 12px;
      position: relative;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      z-index: 10;
    }

    body.dark-mode .loading-overlay {
      background: rgba(18, 22, 35, 0.9);
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--border-medium);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      background: var(--bg-surface);
      border-radius: 48px;
      color: var(--text-muted);
    }

    @media (max-width: 760px) {
      .page-shell { padding: 20px; }
      .admin-nav { padding: 12px 20px; }
      .admin-nav__brand { font-size: 1.1rem; }
      .admin-nav__links { gap: 8px; }
      .admin-nav__links a { padding: 6px 12px; font-size: 0.9rem; }
      .filter-bar { grid-template-columns: 1fr; }
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .modal-content { border-radius: 32px; }
      .modal-header { padding: 20px 24px 0; }
      .modal-body { padding: 20px 24px 28px; }
    }
  </style>
</head>
<body>
  <header class="admin-nav">
    <div class="admin-nav__brand">BLOCKS</div>
    <nav class="admin-nav__links">
      <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
      <a href="{{ url_for('admin_products') }}" class="active">Products</a>
      <a href="{{ url_for('admin_logout') }}">Logout</a>
      <button class="theme-toggle" id="themeToggleBtn" aria-label="Dark mode">
        <i class="fas fa-moon"></i>
      </button>
    </nav>
  </header>
  <div class="page-shell">
    <div class="page-header">
      <div>
        <h1 class="page-title">Product Catalog</h1>
        <p class="page-subtitle">Manage inventory, edit items, upload images — all in one modern workspace.</p>
      </div>
      <button class="btn-primary" onclick="openAddModal()">+ Add New Product</button>
    </div>

    <div class="filter-bar">
      <div class="filter-control">
        <label for="searchInput">🔍 Search</label>
        <input id="searchInput" type="text" placeholder="Product name or category..." />
      </div>
      <div class="filter-control">
        <label for="categoryFilter">📂 Category</label>
        <select id="categoryFilter">
          <option value="">All Categories</option>
        </select>
      </div>
    </div>

    <div id="productsGrid" class="product-grid"></div>
  </div>
<!-- Back to Top Button with Progress -->
<div id="backToTopContainer" style="position: fixed; bottom: 20px; right: 20px; display: none; z-index: 1000;">
  <button id="backToTop" style="position: relative; width: 56px; height: 56px; padding: 0; font-size: 0; background-color: #333; color: #fff; border: none; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;">
    <!-- Circular Progress Background -->
    <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="26" fill="none" stroke="#444" stroke-width="4.3" />
      <circle id="progressCircle" cx="28" cy="28" r="26" fill="none" stroke="#ffffff" stroke-width="4.3" stroke-dasharray="163.36" stroke-dashoffset="163.36" style="transform: rotate(-90deg); transform-origin: 28px 28px; transition: stroke-dashoffset 0.1s linear;" />
    </svg>
    <!-- Arrow Icon -->
    <svg id="backToTopArrow" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" style="position: relative; z-index: 1;">
      <polyline points="8,14 12,10 16,14" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<script>
  const backToTopContainer = document.getElementById('backToTopContainer');
  const backToTopButton = document.getElementById('backToTop');
  const progressCircle = document.getElementById('progressCircle');
  const circumference = 2 * Math.PI * 26; // radius = 26

  window.addEventListener('scroll', () => {
    const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
    const scrolled = window.scrollY;
    const scrollPercent = scrollHeight > 0 ? (scrolled / scrollHeight) * 100 : 0;

    // Show/hide button based on scroll position
    if (window.scrollY > 200) {
      backToTopContainer.style.display = 'block';
      backToTopContainer.style.opacity = '1';
      backToTopContainer.style.transform = 'scale(1)';
    } else {
      backToTopContainer.style.opacity = '0';
      backToTopContainer.style.transform = 'scale(0.9)';
      setTimeout(() => {
        if (window.scrollY <= 200) backToTopContainer.style.display = 'none';
      }, 300);
    }

    // Update progress circle
    const offset = circumference - (scrollPercent / 100) * circumference;
    progressCircle.style.strokeDashoffset = offset;
  });

  backToTopButton.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Hover effect
  const arrowIcon = document.getElementById('backToTopArrow');
  
  backToTopButton.addEventListener('mouseover', () => {
    backToTopButton.style.backgroundColor = '#fff';
    backToTopButton.style.boxShadow = '0 6px 12px rgba(76, 175, 80, 0.4)';
    arrowIcon.querySelector('polyline').style.stroke = '#333';
  });

  backToTopButton.addEventListener('mouseout', () => {
    backToTopButton.style.backgroundColor = '#333';
    backToTopButton.style.boxShadow = '0 4px 6px rgba(0, 0, 0, 0.1)';
    arrowIcon.querySelector('polyline').style.stroke = '#fff';
  });
</script>
  <!-- MODAL -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add Product</h2>
        <button class="btn-secondary" onclick="closeModal()">✕ Close</button>
      </div>
      <div class="modal-body">
        <form id="productForm">
          <input type="hidden" id="productId">
          
          <label>Product Name</label>
          <input type="text" id="productName" required>

          <label>Price (৳)</label>
          <input type="number" id="productPrice" required>

          <label>Category</label>
          <input type="text" id="productCategory" list="categoryOptions" required>
          <datalist id="categoryOptions"></datalist>

          <label>Stock Quantity</label>
          <input type="number" id="productStock" placeholder="Units in stock" required>

          <div class="drag-drop-zone" id="dragDropZone" onclick="document.getElementById('imageFile').click()">
            <div class="upload-icon">🖼️</div>
            <p><strong>Drag & drop an image here</strong></p>
            <p style="font-size: 0.8rem;">or click to select file</p>
            <input type="file" id="imageFile" accept="image/*" style="display: none;">
          </div>

          <div id="uploadProgress" class="upload-progress" style="display: none;">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <p id="uploadStatus" style="margin-top: 8px; font-size: 0.8rem;"></p>
          </div>

          <div id="imagePreview" style="text-align: center;"></div>
          <p id="imageUrlDisplay" style="font-size: 0.75rem; color: var(--text-muted); word-break: break-all;"></p>
          <input type="hidden" id="productImage" required>

          <div class="form-footer">
            <div id="loadingOverlay" class="loading-overlay" style="display: none;">
              <div class="loading-spinner"></div>
              <span style="font-weight: 600; color: var(--text-primary);">Saving product...</span>
            </div>
            <button type="submit" class="btn-primary">Save Product</button>
            <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // -----------------------------------------------
    // ALL LOGIC PRESERVED — only modern styling & theme
    // -----------------------------------------------
    let products = [];

    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const categoryOptions = document.getElementById('categoryOptions');

    async function loadProducts() {
      try {
        const res = await fetch('/admin/api/products', {
          credentials: 'include'
        });

        if (!res.ok || res.redirected || !res.headers.get('content-type')?.includes('application/json')) {
          document.getElementById('productsGrid').innerHTML = '<div class="empty-state">⚠️ Unable to load products. Please refresh or log in again.</div>';
          return;
        }

        products = await res.json();
        populateCategoryFilters();
        renderProducts();
      } catch (error) {
        console.error(error);
        document.getElementById('productsGrid').innerHTML = '<div class="empty-state">❌ Network error. Could not fetch products.</div>';
      }
    }

    function getProductCategories(product) {
      const categoryValue = product.Category ?? product.category ?? product['Category'] ?? product['category'] ?? '';
      return String(categoryValue).split(/[,;|\/]/).map(c => c.trim()).filter(Boolean);
    }

    function getFilteredProducts() {
      const searchTerm = searchInput?.value.trim().toLowerCase() || '';
      const selectedCategory = categoryFilter?.value.trim().toLowerCase() || '';
      return products.filter(p => {
        const name = String(p.Product || p.product || '').toLowerCase();
        const categoryText = String(p.Category || p.category || '').toLowerCase();
        const categoryList = getProductCategories(p).map(c => c.toLowerCase());
        const searchMatch = !searchTerm || name.includes(searchTerm) || categoryText.includes(searchTerm);
        const categoryMatch = !selectedCategory || categoryList.includes(selectedCategory);
        return searchMatch && categoryMatch;
      });
    }

    function populateCategoryFilters() {
      const categoryMap = new Map();
      products.forEach(p => {
        getProductCategories(p).forEach(cat => {
          const lower = cat.toLowerCase();
          if (!categoryMap.has(lower)) categoryMap.set(lower, cat);
        });
      });
      const categories = Array.from(categoryMap.values()).sort((a,b) => a.localeCompare(b));
      if (categoryFilter) {
        categoryFilter.innerHTML = '<option value="">All Categories</option>' + categories.map(c => `<option value="${c.toLowerCase()}">${c}</option>`).join('');
        categoryFilter.value = '';
      }
      if (categoryOptions) {
        categoryOptions.innerHTML = categories.map(c => `<option value="${c}"></option>`).join('');
      }
    }

    function renderProducts() {
      const filtered = getFilteredProducts();
      const grid = document.getElementById('productsGrid');
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state">No products match your filters. Try adjusting search or add a new product.</div>';
        return;
      }
      grid.innerHTML = filtered.map(p => `
        <div class="product-card ${p.Stock == 0 ? 'out-of-stock' : ''}">
          <img src="${p.Image || '/static/images/placeholder.jpg'}" alt="${p.Product}" class="product-image" onerror="this.src='/static/images/placeholder.jpg'">
          <h3>${escapeHtml(p.Product)}</h3>
          <p><strong>৳${p.Price}</strong></p>
          <p><span class="product-tag">${escapeHtml(p.Category) || 'Uncategorized'}</span></p>
          <p>Stock: <strong>${p.Stock}</strong> units</p>
          <div class="card-actions">
            <button class="btn-secondary" onclick="openEditModal(${p.id})">Edit</button>
            <button class="btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    searchInput?.addEventListener('input', renderProducts);
    categoryFilter?.addEventListener('change', renderProducts);

    function openAddModal() {
      document.getElementById('modalTitle').textContent = 'Add Product';
      document.getElementById('productForm').reset();
      document.getElementById('productId').value = '';
      document.getElementById('imageFile').value = '';
      const previewImg = document.getElementById('previewImg');
      if(previewImg) previewImg.remove();
      document.getElementById('imageUrlDisplay').textContent = '';
      document.getElementById('uploadProgress').style.display = 'none';
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('productImage').value = '';
      // Reset loading state
      const loadingOverlay = document.getElementById('loadingOverlay');
      const form = document.getElementById('productForm');
      const formInputs = form.querySelectorAll('input, textarea, button');
      loadingOverlay.style.display = 'none';
      formInputs.forEach(input => input.disabled = false);
      document.body.style.overflow = 'hidden';
      document.getElementById('productModal').style.display = 'flex';
    }

    function openEditModal(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;
      document.getElementById('modalTitle').textContent = 'Edit Product';
      document.getElementById('productId').value = product.id;
      document.getElementById('productName').value = product.Product;
      document.getElementById('productPrice').value = product.Price;
      document.getElementById('productCategory').value = product.Category;
      document.getElementById('productStock').value = product.Stock;
      document.getElementById('productImage').value = product.Image || '';
      document.getElementById('imageFile').value = '';
      document.getElementById('uploadProgress').style.display = 'none';
      document.getElementById('imageUrlDisplay').textContent = product.Image ? `Current image: ${product.Image.substring(0, 55)}...` : 'No image set';
      
      let previewImg = document.getElementById('previewImg');
      if (product.Image) {
        if (!previewImg) {
          previewImg = document.createElement('img');
          previewImg.id = 'previewImg';
          document.getElementById('imagePreview').appendChild(previewImg);
        }
        previewImg.src = product.Image;
        previewImg.style.display = 'block';
      } else if(previewImg) previewImg.remove();
      
      // Reset loading state
      const loadingOverlay = document.getElementById('loadingOverlay');
      const form = document.getElementById('productForm');
      const formInputs = form.querySelectorAll('input, textarea, button');
      loadingOverlay.style.display = 'none';
      formInputs.forEach(input => input.disabled = false);
      
      document.body.style.overflow = 'hidden';
      document.getElementById('productModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('productModal').style.display = 'none';
      document.body.style.overflow = '';
      // Reset loading state
      const loadingOverlay = document.getElementById('loadingOverlay');
      const form = document.getElementById('productForm');
      const formInputs = form.querySelectorAll('input, textarea, button');
      loadingOverlay.style.display = 'none';
      formInputs.forEach(input => input.disabled = false);
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('productId').value;
      const imageUrl = document.getElementById('productImage').value;
      if (!imageUrl) { alert('Please upload an image before saving.'); return; }
      
      // Show loading state
      const loadingOverlay = document.getElementById('loadingOverlay');
      const form = document.getElementById('productForm');
      const formInputs = form.querySelectorAll('input, textarea, button');
      
      loadingOverlay.style.display = 'flex';
      formInputs.forEach(input => input.disabled = true);
      
      const data = {
        Product: document.getElementById('productName').value,
        Price: parseFloat(document.getElementById('productPrice').value),
        Category: document.getElementById('productCategory').value,
        Stock: parseInt(document.getElementById('productStock').value),
        Image: imageUrl
      };
      
      try {
        if (id) {
          await fetch(`/admin/api/products/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        } else {
          await fetch('/admin/api/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        }
        closeModal();
        loadProducts();
        alert('✅ Product saved successfully!');
      } catch (error) { 
        alert('Error saving product: ' + error.message);
      } finally {
        // Hide loading state
        loadingOverlay.style.display = 'none';
        formInputs.forEach(input => input.disabled = false);
      }
    });

    async function deleteProduct(id) {
      if (!confirm('Delete this product permanently?')) return;
      try {
        await fetch(`/admin/api/products/${id}`, { method: 'DELETE' });
        loadProducts();
      } catch (error) { alert('Delete failed: ' + error.message); }
    }

    async function uploadImage(file) {
      if (!file) return;
      const uploadProgressDiv = document.getElementById('uploadProgress');
      const uploadStatus = document.getElementById('uploadStatus');
      const progressFill = document.getElementById('progressFill');
      uploadProgressDiv.style.display = 'block';
      uploadStatus.textContent = 'Uploading...';
      progressFill.style.width = '30%';
      const formData = new FormData();
      formData.append('image', file);
      try {
        const res = await fetch('/admin/upload_image', { method: 'POST', body: formData });
        progressFill.style.width = '70%';
        if (!res.ok) throw new Error('Upload failed');
        const data = await res.json();
        const imageUrl = data.image_url;
        document.getElementById('productImage').value = imageUrl;
        let previewImg = document.getElementById('previewImg');
        if (!previewImg) {
          previewImg = document.createElement('img');
          previewImg.id = 'previewImg';
          document.getElementById('imagePreview').appendChild(previewImg);
        }
        previewImg.src = imageUrl;
        document.getElementById('imageUrlDisplay').textContent = `✓ Uploaded: ${imageUrl.substring(0, 60)}...`;
        progressFill.style.width = '100%';
        uploadStatus.textContent = 'Upload complete!';
        uploadStatus.style.color = '#10b981';
        setTimeout(() => { uploadProgressDiv.style.display = 'none'; progressFill.style.width = '0%'; }, 1500);
      } catch (err) {
        uploadStatus.textContent = `Error: ${err.message}`;
        uploadStatus.style.color = '#ef4444';
      }
    }

    const dragDropZone = document.getElementById('dragDropZone');
    const imageFileInput = document.getElementById('imageFile');
    dragDropZone.addEventListener('dragover', (e) => { e.preventDefault(); dragDropZone.style.borderColor = 'var(--accent)'; });
    dragDropZone.addEventListener('dragleave', () => { dragDropZone.style.borderColor = 'var(--border-medium)'; });
    dragDropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dragDropZone.style.borderColor = 'var(--border-medium)';
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) { imageFileInput.files = e.dataTransfer.files; uploadImage(file); }
      else alert('Please drop an image file.');
    });
    imageFileInput.addEventListener('change', (e) => { if(e.target.files[0]) uploadImage(e.target.files[0]); });

    // ========= DARK/LIGHT MODE (fully functional, preserves logic) ==========
    const themeBtn = document.getElementById('themeToggleBtn');
    function setTheme(isDark) {
      if (isDark) {
        document.body.classList.add('dark-mode');
        const icon = themeBtn.querySelector('i');
        if (icon) icon.className = 'fas fa-sun';
      } else {
        document.body.classList.remove('dark-mode');
        const icon = themeBtn.querySelector('i');
        if (icon) icon.className = 'fas fa-moon';
      }
      localStorage.setItem('adminTheme', isDark ? 'dark' : 'light');
    }
    const savedTheme = localStorage.getItem('adminTheme');
    if (savedTheme === 'dark') setTheme(true);
    else setTheme(false);
    themeBtn.addEventListener('click', () => {
      const willBeDark = !document.body.classList.contains('dark-mode');
      setTheme(willBeDark);
    });

    loadProducts();
  </script>
</body>
</html>
